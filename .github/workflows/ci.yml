name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-reports-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            reports/**
            test-results/**
            allure-results/**

  api-tests:
    name: API (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm start &
      - run: npx wait-on http://localhost:3000
      - run: npm run test:api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-reports-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            reports/**
            test-results/**
            allure-results/**

  ui-tests:
    name: UI (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm start &
      - run: npx wait-on http://localhost:3000
      - run: npm run test:ui
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-reports-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            reports/**
            test-results/**
            playwright-report/**
            allure-results/**

  docker-test:
    name: Docker test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t currency-converter:test .
      - run: docker run -d -p 3000:3000 --name cc currency-converter:test
      - run: docker exec cc wait-on http://localhost:3000 --timeout 30000
      - run: docker exec cc npm run test:unit
      - run: docker exec cc npm run test:api
      - run: docker exec cc npm run test:ui
      - if: always()
        run: docker stop cc || true && docker rm cc || true

  allure-report:
    name: Build and publish Allure report
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests, docker-test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: all-allure-results
          merge-multiple: true
      - run: |
          mkdir -p allure-results
          cp -r all-allure-results/* allure-results/ 2>/dev/null || true
      - run: npx allure generate allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
      - uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests, docker-test, allure-report]
    if: always()
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNIT_STATUS: ${{ needs.unit-tests.result }}
          API_STATUS: ${{ needs.api-tests.result }}
          UI_STATUS: ${{ needs.ui-tests.result }}
          DOCKER_STATUS: ${{ needs.docker-test.result }}
          ALLURE_STATUS: ${{ needs.allure-report.result }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$UNIT_STATUS" = "success" ] && [ "$API_STATUS" = "success" ] && [ "$UI_STATUS" = "success" ] && [ "$DOCKER_STATUS" = "success" ]; then
            OVERALL="SUCCESS"
          else
            OVERALL="FAILED"
          fi
          if [ "$REF_NAME" = "main" ] && [ "$ALLURE_STATUS" = "success" ]; then
            ALLURE_URL="https://${REPO%/*}.github.io/${REPO#*/}/"
          else
            ALLURE_URL="Allure report is available as workflow artifact."
          fi
          MESSAGE="CI/CD result: ${OVERALL}
Repository: ${REPO}
Branch: ${REF_NAME}
Commit: ${SHA}
Unit: ${UNIT_STATUS}
API: ${API_STATUS}
UI: ${UI_STATUS}
Docker: ${DOCKER_STATUS}
Allure: ${ALLURE_STATUS}
Actions run: https://github.com/${REPO}/actions/runs/${RUN_ID}
Allure: ${ALLURE_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}"
